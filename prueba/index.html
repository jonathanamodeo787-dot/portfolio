<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Tecnología</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<svg viewBox="0 0 1200 250">

    <defs>

        <linearGradient id="grad" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#00f7ff"/>
            <stop offset="50%" stop-color="#00aaff"/>
            <stop offset="100%" stop-color="#7d5fff"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <symbol id="logo">
            <text x="50%" y="50%" dy=".35em" text-anchor="middle">
                Click Tecnología
            </text>
        </symbol>

    </defs>

    <!-- Brillo -->
    <use href="#logo" class="glow"></use>

    <!-- Relleno -->
    <use href="#logo" class="fill"></use>

    <!-- Borde animado -->
    <use href="#logo" class="stroke"></use>

</svg>

</body>
</html>
