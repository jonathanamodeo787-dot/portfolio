<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Tecnología</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Empieza el lienzo SVG -->
    <svg viewBox="0 0 1200 250">

        <!-- =======================
            DEFINICIONES
            Aquí guardamos elementos
            que usaremos después.
        ======================== -->
        <defs>

            <!-- Degradado -->
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">

                <stop offset="0%" stop-color="#00ffff">
                    <animate
                        attributeName="stop-color"
                        values="#ff3636;#f35f00;#f35f00;#ff3636;#f35f00;#f35f00"
                        dur="6s"
                        repeatCount="indefinite" />
                </stop>

                <stop offset="50%" stop-color="#00aaff">
                    <animate
                        attributeName="stop-color"
                        values="#00aaff;#ff00ff;#00ffff;#00ff66;#00aaff"
                        dur="6s"
                        repeatCount="indefinite" />
                </stop>

                <stop offset="100%" stop-color="#7d5fff">
                    <animate
                        attributeName="stop-color"
                        values="#7d5fff;#ff8800;#ffff00;#00ffff;#7d5fff"
                        dur="6s"
                        repeatCount="indefinite" />
                </stop>

            </linearGradient>

            <!-- Filtro para crear brillo -->
            <filter id="glow">

                <!-- Desenfoca el texto -->
                <feGaussianBlur
                    stdDeviation="5"
                    result="blur"/>

                <!-- Junta el brillo con el texto -->
                <feMerge>

                    <feMergeNode in="blur"/>

                    <feMergeNode in="SourceGraphic"/>

                </feMerge>

            </filter>

            <!-- Guardamos el texto -->
            <symbol id="logo">

                <text
                    x="50%"
                    y="50%"
                    text-anchor="middle"
                    dy=".35em">

                    Click Tecnologia

                </text>

            </symbol>

        </defs>

        <!-- =====================
            AQUÍ DIBUJAMOS
            EL TEXTO
        ====================== -->

        <!-- Capa del brillo -->
        <use
            href="#logo"
            class="glow">

        </use>

        <!-- Capa del relleno -->
        <use
            href="#logo"
            class="fill">

        </use>

        <!-- Capa del borde animado -->
        <use
            href="#logo"
            class="stroke">

        </use>

    </svg>

</body>

</html>
